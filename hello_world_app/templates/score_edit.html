<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Course - Grade Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }
    header { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 24px 32px; text-align: center; }
    header h1 { font-size: 2rem; font-weight: 700; }
    .container { max-width: 600px; margin: 40px auto; padding: 0 16px; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; }
    .card h2 { font-size: 1.3rem; font-weight: 700; color: #4f46e5; margin-bottom: 24px; }
    .form-group { display: flex; flex-direction: column; margin-bottom: 18px; }
    label { font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
    input[type="text"], input[type="number"] { padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #4f46e5; }
    .actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn { padding: 11px 24px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1.5px solid #d1d5db; }
  </style>
</head>
<body>
<header>
  <h1>&#128202; Final Exam Grade Calculator</h1>
</header>
<div class="container">
  <div class="card">
    <h2>&#9998; Edit Course: {{ entry.course_name }}</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Course Name</label>
        {{ form.course_name }}
      </div>
      <div class="form-group">
        <label>Current Grade (%)</label>
        {{ form.current_grade }}
      </div>
      <div class="form-group">
        <label>Desired Grade (%)</label>
        {{ form.desired_grade }}
      </div>
      <div class="form-group">
        <label>Final Exam Weight (%)</label>
        {{ form.final_weight }}
      </div>
      <div class="actions">
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{% url 'score_view' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
